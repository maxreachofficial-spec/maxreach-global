    <title>MaxReach | Professional Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>

<meta name="description" content="Entry portal for MaxReach Global D2C Experience. High-performance brand scaling.">
<meta name="robots" content="noindex, follow">

<link rel="icon" type="image/png" sizes="16x16" href="homeimages/maxreach-favicon-16.png">
<link rel="icon" type="image/png" sizes="32x32" href="homeimages/maxreach-favicon-32.png">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #fff; font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
        }

        /* Neon Glow Overlay */
        .neon-glow-layer {
            position: fixed; inset: 0;
            box-shadow: inset 0 0 50px rgba(59, 130, 246, 0.2), inset 0 0 120px rgba(59, 130, 246, 0.1);
            pointer-events: none; z-index: 99;
        }

        /* Desktop Styles */
        @media (min-width: 1024px) {
            #mobile-hero { display: none !important; }
            #desktop-hero { position: relative; height: 100vh; width: 100%; overflow: hidden; }
            .dsktp-video { width: 100%; height: 100vh; object-fit: cover; }
            .dsktp-content { 
                position: absolute; top: 50%; right: 5%; transform: translateY(-50%);
                width: 42%; text-align: center; z-index: 50; 
            }
            .dsktp-h1 { font-size: 4rem; font-weight: 900; line-height: 1.1; color: #111; text-transform: uppercase; }
        }

        /* Mobile Styles */
        @media (max-width: 1023px) {
            #desktop-hero { display: none !important; }
            #mobile-hero { 
                display: flex !important; flex-direction: column !important;
                height: 100vh; width: 100%; background: #fff;
                justify-content: space-between; align-items: center; padding: 60px 0;
            }
            .mob-h1 { font-size: 1.8rem; font-weight: 900; line-height: 1.2; color: #111; text-transform: uppercase; text-align: center; }
            .mob-video-container { width: 90%; height: 45vh; border-radius: 20px; overflow: hidden; box-shadow: 0 15px 40px rgba(0,0,0,0.1); }
            .mob-video { width: 100%; height: 100%; object-fit: cover; }
        }

        /* Shared Button Style */
        .start-trigger { 
            padding: 18px 45px; background: #000; color: #fff; 
            border: 1px solid #3b82f6; letter-spacing: 0.3em; cursor: pointer;
            font-weight: 900; text-transform: uppercase; border-radius: 8px;
            transition: all 0.3s ease;
        }
        .start-trigger:hover { background: #3b82f6; box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }

        .sub-text { color: #3b82f6; font-weight: 700; letter-spacing: 2px; font-size: 11px; margin-top: 15px; }
   
   /* Body aur html ko lock karne ke liye */
body, html { 
    margin: 0; padding: 0; 
    width: 100%; 
    height: 100%;
    /* Isse mobile ka "pull-to-refresh" aur extra scroll band hoga */
    overflow: hidden; 
    position: fixed; 
    touch-action: none; 
}

#mobile-hero, #desktop-hero {
    /* vh ki jagah dynamic variable use karenge jo JS se aayega */
    height: calc(var(--vh, 1vh) * 100); 
    width: 100%;
    overflow: hidden;
}
   
   </style>
</head>
<body id="main-body">

    <h1 class="sr-only" style="position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); border: 0;">
        MaxReach Global | D2C Brand Scaling & Performance Marketing Experience
    </h1>

    <div class="neon-glow-layer"></div>

    <div id="desktop-hero" class="hero-wrap">
        <video class="dsktp-video" autoplay muted playsinline loop>
            <source src="videos/space.mp4" type="video/mp4">
        </video>
        <div class="dsktp-content">
            <h1 class="dsktp-h1">Explore the <br> <span class="text-blue-600">Blueprint</span> <br> of Digital World</h1>
            <div class="flex flex-col items-center">
                <button class="dsktp-btn start-trigger mt-8" style="opacity:0; transform: scale(0.8);">Start Journey</button>
                <div class="dsktp-sub sub-text" style="opacity:0;">THIS IS THE WAY TO EXPLORE DIGITALLY</div>
            </div>
        </div>
    </div>

    <div id="mobile-hero" class="hero-wrap">
        <div class="mob-header">
            <h1 class="mob-h1">Explore the <br> <span class="text-blue-600">Blueprint</span> <br> of Digital World</h1>
        </div>
        
        <div class="mob-video-container">
            <video class="mob-video" autoplay muted playsinline loop>
                <source src="videos/space3.mp4" type="video/mp4">
            </video>
        </div>

        <div class="flex flex-col items-center w-full">
            <button class="mob-btn start-trigger w-[85%]" style="opacity:0; transform: scale(0.8);">Start Journey</button>
            <div class="mob-sub sub-text" style="opacity:0;">THIS IS THE WAY TO EXPLORE DIGITALLY</div>
        </div>
    </div>

    <script>
        window.addEventListener('load', () => {
            const isMobile = window.innerWidth < 1024;
            const activeVideo = isMobile ? document.querySelector('.mob-video') : document.querySelector('.dsktp-video');
            const startBtns = document.querySelectorAll('.start-trigger');
            const subLines = document.querySelectorAll('.sub-text');
            const heroSections = document.querySelectorAll('.hero-wrap');

            // 1. Button Reveal Logic (1.8s delay check)
            activeVideo.addEventListener('timeupdate', function() {
                if (this.currentTime >= 1.8) {
                    gsap.to(startBtns, { opacity: 1, scale: 1, duration: 0.8, ease: "back.out(1.7)" });
                    gsap.to(subLines, { opacity: 1, duration: 1, delay: 0.3 });
                }
            });

            // 2. Smooth Transition to ecommerce.html
            startBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    // Pura body ya hero section smoothly fade out hoga
                    gsap.to(".hero-wrap, .neon-glow-layer", { 
                        opacity: 0, 
                        duration: 0.8, 
                        ease: "power2.inOut",
                        onComplete: () => {
                            window.location.href = "ecommerce.html";
                        }
                    });
                });
            });
        });



        window.addEventListener('load', () => {
    // 1. DYNAMIC VH CALCULATION (Fixes Mobile Address Bar Jump)
    const setHeight = () => {
        let vh = window.innerHeight * 0.01;
        document.documentElement.style.setProperty('--vh', `${vh}px`);
    };

    setHeight();
    window.addEventListener('resize', setHeight);

    // 2. PREVENT SCROLL (Touch Events Lock)
    document.addEventListener('touchmove', (e) => {
        if (e.target.closest('.hero-wrap')) {
            e.preventDefault();
        }
    }, { passive: false });

    // --- Baki aapka existing GSAP/Video logic niche ---
    const isMobile = window.innerWidth < 1024;
    const activeVideo = isMobile ? document.querySelector('.mob-video') : document.querySelector('.dsktp-video');
    const startBtns = document.querySelectorAll('.start-trigger');
    const subLines = document.querySelectorAll('.sub-text');

    activeVideo.addEventListener('timeupdate', function() {
        if (this.currentTime >= 1.8) {
            gsap.to(startBtns, { opacity: 1, scale: 1, duration: 0.8, ease: "back.out(1.7)" });
            gsap.to(subLines, { opacity: 1, duration: 1, delay: 0.3 });
        }
    });

    startBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            gsap.to(".hero-wrap, .neon-glow-layer", { 
                opacity: 0, 
                duration: 0.8, 
                ease: "power2.inOut",
                onComplete: () => {
                    window.location.href = "ecommerce.html";
                }
            });
        });
    });
});

    </script>
</body>
</html>
