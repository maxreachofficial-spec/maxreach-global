    <style>
        :root {
            --mx-blue: #00B0FF;
            --mx-dark-bg: #020617;
            --glass-white: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --insta-green: #00f281;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: radial-gradient(circle at 50% -20%, #001a33 0%, var(--mx-dark-bg) 60%); color: #ffffff; overflow-x: hidden; line-height: 1.7; min-height: 100vh; }

        /* --- Navigation & Back Button --- */
        .nav-header { position: absolute; top: 30px; left: 30px; z-index: 1000; }
        .back-btn { display: flex; align-items: center; gap: 10px; color: white; text-decoration: none; background: var(--glass-white); padding: 10px 20px; border-radius: 50px; border: 1px solid var(--glass-border); font-weight: 500; backdrop-filter: blur(10px); transition: 0.3s; }
        .back-btn:hover { background: var(--mx-blue); border-color: var(--mx-blue); }

        /* --- Professional Loader --- */
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--mx-dark-bg); z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 50px; height: 50px; border: 3px solid var(--glass-border); border-top-color: var(--mx-blue); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- UI Components --- */
        .live-badge-wrapper { text-align: center; margin-top: 100px; }
        .live-status { display: inline-flex; align-items: center; gap: 8px; background: rgba(0, 242, 129, 0.08); color: var(--insta-green); padding: 8px 18px; border-radius: 50px; font-size: 0.75rem; font-weight: 800; border: 1px solid rgba(0, 242, 129, 0.2); }
        .dot { width: 8px; height: 8px; background: var(--insta-green); border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.4); opacity: 0.5; } }

        .portfolio-hero { text-align: center; padding: 20px 20px 50px; }
        .profile-pic { width: 150px; height: 150px; border-radius: 50%; border: 3px solid var(--mx-blue); padding: 6px; object-fit: cover; margin-bottom: 25px; box-shadow: 0 0 40px rgba(0, 176, 255, 0.25); background: var(--mx-dark-bg); }

        .freelancer-role { color: var(--mx-blue); text-transform: uppercase; letter-spacing: 5px; font-size: 0.9rem; font-weight: 600; }

        .strap-bar { display: flex; align-items: center; justify-content: space-around; background: rgba(255, 255, 255, 0.03); border: 1px solid var(--glass-border); padding: 35px 50px; border-radius: 24px; max-width: 1000px; margin: 40px auto 80px; backdrop-filter: blur(20px); }

        .about-section { max-width: 850px; margin: 0 auto 100px; text-align: center; padding: 0 25px; }

/* --- ONLY VIDEO CARD EFFECTS (Sirf Videos ke liye) --- */

/* 1. Base State: Low-pixel hide karne ke liye constant blur aur dark layer */
.video-card .media img { 
    filter: brightness(0.6) blur(3px); 
    transform: scale(1.02); /* Edges saaf karne ke liye */
}

/* 2. Play Button: Jo hamesha thoda sa dikhega focus pixels se hatane ke liye */

    position: absolute; 
    top: 50%; 
    left: 50%; 
    transform: translate(-50%,-50%); 
    font-size: 3.5rem; 
    color: white; 
    opacity: 0.7; /* Halka sa hamesha dikhega */
    transition: 0.3s; 
    pointer-events: none; 
    z-index: 2;
}

/* 3. Hover Effect: Sirf video card hover hone par saaf hoga */
.video-card:hover .media img { 
    transform: scale(1.1); 
    opacity: 1; /* Purani opacity 0.6 hata di taaki video saaf dikhe */
    filter: brightness(0.9) blur(0px); 
}

.video-card:hover .play-overlay { 
    opacity: 1; 
    transform: translate(-50%,-50%) scale(1.1); 
}

    <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw8E7r8Z9YERIqsITUyYx74y9ZzN0tFl9Ru9noF-x1JUZvxfpERqF4HOFg8yWm-BAXkOQ/exec";
    const WHATSAPP_NO = "919810591327";
    const urlParams = new URLSearchParams(window.location.search);
    const freelancerId = urlParams.get('id');

    // Global State for Button
    let isExpanded = false;

    async function loadData() {
        if (!freelancerId) { 
            document.body.innerHTML = "<div style='text-align:center; padding:100px;'><h1>ID Missing</h1><a href='freelancers.html' style='color:cyan;'>Go Back</a></div>";
            return; 
        }
        try {
            const response = await fetch(`${SCRIPT_URL}?id=${freelancerId}`);
            const result = await response.json();
            if (result.error || !result.length) {
                document.body.innerHTML = "<div style='text-align:center; padding:100px;'><h1>Portfolio Not Found</h1><p>Please check the ID or contact support.</p></div>";
                return;
            }
            renderPortfolio(result[0]);
            setupSEO(result[0]);
            document.getElementById('loader').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
        } catch (err) { console.error("Load Error:", err); }
    }

    function setupSEO(u) {
        const schema = {
            "@context": "https://schema.org",
            "@type": "Person",
            "name": u.Name,
            "jobTitle": u.Niche,
            "description": u.About,
            "image": u.PhotoLink_1 || u.Photo,
            "brand": { "@type": "Brand", "name": "MaxReach Global" },
            "url": window.location.href
        };
        document.getElementById('seo-schema').text = JSON.stringify(schema);
        document.title = `${u.Name} | Expert ${u.Niche} - MaxReach Global`;
    }

    function renderPortfolio(u) {
        const content = document.getElementById('main-content');
        const profileImg = u.PhotoLink_1 || u.Photo || 'https://via.placeholder.com/150';

        content.innerHTML = `
            <div class="live-badge-wrapper">
                <div class="live-status"><span class="dot"></span> Available for Hire</div>
            </div>

            <section class="portfolio-hero">
                <img src="${profileImg}" class="profile-pic" alt="${u.Name} - ${u.Niche} Expert">
                <h1 class="freelancer-name">${u.Name}</h1>
                <p class="freelancer-role">${u.Niche || 'Premium Consultant'}</p>

                <div class="strap-bar">
                    <div class="strap-item"><i class="fa-solid fa-hourglass-start"></i><span>Experience</span><b>${u.Exp || '2+ Yrs'}</b></div>
                    <div class="strap-item"><i class="fa-solid fa-check-double" style="color:var(--insta-green)"></i><span>Status</span><b>Verified Pro</b></div>
                    <div class="strap-item"><i class="fa-solid fa-diagram-project"></i><span>Portfolio</span><b>${u.Projects_Done || '05+ Projects'}</b></div>
                </div>
            </section>

            <div class="about-section">
                <h2>The Expertise</h2>
                <p>${u.About || 'Expert digital professional delivering high-impact solutions for modern brands.'}</p>
            </div>

            <div class="metric-grid">
                <div class="m-box">
                    <span class="material-symbols-outlined" style="color:var(--mx-blue); font-size:40px;">bolt</span>
                    <h3 style="margin:15px 0 5px;">${u.Result_1 || 'Premium Quality'}</h3>
                    <span style="color:#64748b; font-size:0.8rem; letter-spacing:1px;">CORE STRENGTH</span>
                </div>
                <div class="m-box">
                    <span class="material-symbols-outlined" style="color:var(--mx-blue); font-size:40px;">auto_graph</span>
                    <h3 style="margin:15px 0 5px;">${u.Result_2 || 'Client Success'}</h3>
                    <span style="color:#64748b; font-size:0.8rem; letter-spacing:1px;">TRACK RECORD</span>
                </div>
            </div>

            <div class="section-divider">
                <div class="line"></div>
                <div class="section-title">Selected Works</div>
                <div class="line"></div>
            </div>

            <div class="work-container">
                ${renderWorks(u.Videos_Data, 'video')}
                ${renderWorks(u.Websites_Data, 'web')}
                ${renderWorks(u.Images_Data, 'image')}
            </div>

            <button class="drawer-btn" id="mainCTA" onclick="handleHireClick('${u.Name}', '${u.ID}')" aria-label="Hire ${u.Name}">
                <i class="fa-brands fa-whatsapp"></i>
                <span class="btn-text">HIRE ${u.Name.toUpperCase()}</span>
            </button>
        `;
    }

    // Function to handle Click Logic
    function handleHireClick(name, id) {
        const btn = document.getElementById('mainCTA');
        if (!isExpanded) {
            btn.classList.add('active');
            isExpanded = true;
        } else {
            const msg = `Hi MaxReach, I want to hire ${name} (ID: ${id}). Please share details.`;
            window.open(`https://wa.me/${WHATSAPP_NO}?text=${encodeURIComponent(msg)}`, '_blank');
        }
    }

    // Click Outside logic
    document.addEventListener('click', (e) => {
        const btn = document.getElementById('mainCTA');
        if (btn && !btn.contains(e.target) && isExpanded) {
            btn.classList.remove('active');
            isExpanded = false;
        }
    });

    function renderWorks(data, type) {
        if (!data || data === "#" || data.trim() === "") return "";
        let items = data.split(',');
        let html = "";
        let gridStarted = false;

        items.forEach(item => {
            let val = item.trim();
            if (!val) return;
            if (val.startsWith('(') && val.endsWith(')')) {
                let headingText = val.replace(/[()]/g, '');
                html += `${gridStarted ? '</div>' : ''}<div style="margin-top:50px; margin-bottom:20px;"><h3 style="color:var(--mx-blue); letter-spacing:3px; text-transform:uppercase; font-size:1rem;">${headingText}</h3></div><div class="work-grid">`;
                gridStarted = true;
            } else {
                if (!gridStarted) { html += `<div class="work-grid">`; gridStarted = true; }
               if (type === 'video') {
    let [thumb, vid] = val.split('_');
    
    // Yahan humne "video-card" class add kar di hai
    html += `
    <div class="card video-card" onclick="openVideo('${vid}')" style="cursor:pointer">
        <div class="media">
            <img src="${thumb}" alt="Video Thumbnail" loading="lazy">
            <div class="play-overlay">
                <i class="fas fa-play-circle"></i>
            </div>
        </div>
        <div class="info">
            <h5>Project Showcase</h5>
            <p>Click to Play</p>
        </div>
    </div>`;
                } else if (type === 'web') {
                    let [img, name, link] = val.split('_');
                    html += `<div class="card"><div class="media"><img src="${img}" loading="lazy"></div><div class="info"><h5>${name}</h5><a href="${link}" target="_blank" style="color:var(--mx-blue); text-decoration:none;">Live Link <i class="fa-solid fa-arrow-up-right-from-square"></i></a></div></div>`;
                } else {
                    html += `<div class="card"><div class="media" style="height:auto;"><img src="${val}" style="height:auto;" loading="lazy"></div></div>`;
                }
            }
        });
        return html + (gridStarted ? '</div>' : '');
    }

function openVideo(url) {
    const player = document.getElementById('popupPlayer');
    
    // Video source set karein
    player.src = url; 
    
    // Browser ko command dein ki download nahi dikhana hai
    player.setAttribute('controlsList', 'nodownload noplaybackrate');
    player.setAttribute('disablePictureInPicture', 'true');
    
    // Right click protection
    player.oncontextmenu = (e) => e.preventDefault();

    document.getElementById('videoOverlay').style.display = 'flex';
    document.body.style.overflow = 'hidden'; 
    
    // Video play karein
    player.play();

    // Browser Back Button Logic (Video band karne ke liye)
    window.history.pushState({ videoOpen: true }, '');
}

function closeVideo() {
    const player = document.getElementById('popupPlayer');
    player.pause();
    player.src = ""; // Source clear karna zaroori hai
    document.getElementById('videoOverlay').style.display = 'none';
    document.body.style.overflow = 'auto';
}

// Back button detection
window.onpopstate = function() {
    closeVideo();
};

    loadData();
    
  /* --- 🏛️ ELITE VISUALS SHIELD PROTOCOL (SEO OPTIMIZED) --- */

document.addEventListener("DOMContentLoaded", function() {
    
    // 1. Context Menu Protection (Subtle Way)
    // Pure page ko block karne ke bajaye, sirf visual content par focus
    document.addEventListener('contextmenu', e => {
        if (e.target.tagName === 'IMG' || e.target.closest('.post-card')) {
            e.preventDefault();
        }
    });

    // 2. High-Performance Image Protection
    const protectImages = () => {
        // Sirf post-visual images ko target karein
        const portfolioImgs = document.querySelectorAll('.post-visual, #p-img');
        
        portfolioImgs.forEach(img => {
            if (!img.dataset.protected) {
                img.setAttribute('ondragstart', 'return false;');
                img.setAttribute('oncontextmenu', 'return false;');
                
                // Pointer events ko 'none' karne ke bajaye 'select: none' use karein
                // Taaki Google ke accessibility bots images ko read kar sakein
                img.style.userSelect = 'none';
                img.style.webkitUserSelect = 'none';
                img.dataset.protected = 'true';
            }
        });
    };

    // 3. Mutation Observer (Better than setInterval)
    // Ye tabhi chalta hai jab koi naya card add ho, performance bachta hai
    const observer = new MutationObserver(protectImages);
    observer.observe(document.body, { childList: true, subtree: true });
    protectImages();

    // 4. Keyboard Protection (Professional Version)
    // Alert hata diya hai taaki Google bots stuck na ho jayein
    document.addEventListener('keydown', function(e) {
        if (
            e.keyCode === 123 || 
            (e.ctrlKey && (e.keyCode === 85 || e.keyCode === 83 || e.keyCode === 73)) ||
            (e.ctrlKey && e.shiftKey && e.keyCode === 73)
        ) {
            e.preventDefault();
            return false;
        }
    });

    // 5. SEO Friendly CSS Protection
    const style = document.createElement('style');
    style.innerHTML = `
        /* Disable Mobile long-press popup without breaking interaction */
        .post-visual, #p-img {
            -webkit-touch-callout: none !important;
            -webkit-user-select: none !important;
            user-select: none !important;
        }
        
        /* Ensure Action Buttons always work */
        .action-hub, .dots-btn, .menu-item, .cta-primary, .cta-secondary {
            pointer-events: auto !important;
            user-select: auto !important;
        }
    `;
    document.head.appendChild(style);
});


</script>
</body>
</html>
